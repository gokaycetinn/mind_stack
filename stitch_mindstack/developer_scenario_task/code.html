<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>MindStack - Developer Scenario</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#135bec",
                        "background-light": "#f6f6f8",
                        "background-dark": "#101622",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"],
                        "mono": ["JetBrains Mono", "monospace"] // Added for code snippets
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        /* Custom scrollbar hide for cleaner mobile look */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-gray-900 dark:text-gray-100 min-h-screen flex justify-center items-center">
<!-- Mobile Container -->
<div class="w-full max-w-md h-screen overflow-hidden relative flex flex-col bg-background-light dark:bg-background-dark shadow-2xl">
<!-- Background decorative gradient -->
<div class="absolute top-0 left-0 w-full h-full overflow-hidden pointer-events-none z-0">
<div class="absolute top-[-10%] right-[-10%] w-64 h-64 bg-primary/10 rounded-full blur-3xl"></div>
<div class="absolute bottom-[-10%] left-[-10%] w-80 h-80 bg-primary/5 rounded-full blur-3xl"></div>
</div>
<!-- 1. Header Navigation -->
<header class="relative z-10 px-6 pt-12 pb-4 flex justify-between items-center w-full">
<button class="p-2 -ml-2 rounded-full hover:bg-gray-200 dark:hover:bg-white/5 transition-colors group">
<span class="material-icons-outlined text-gray-600 dark:text-gray-300 group-hover:text-primary transition-colors">arrow_back</span>
</button>
<div class="flex flex-col items-center">
<span class="text-xs font-semibold tracking-wider text-gray-500 dark:text-gray-400 uppercase">Git Mastery</span>
<div class="flex space-x-1 mt-1">
<div class="h-1 w-8 bg-primary rounded-full"></div>
<div class="h-1 w-2 bg-gray-300 dark:bg-gray-700 rounded-full"></div>
<div class="h-1 w-2 bg-gray-300 dark:bg-gray-700 rounded-full"></div>
</div>
</div>
<button class="p-2 -mr-2 rounded-full hover:bg-gray-200 dark:hover:bg-white/5 transition-colors group">
<span class="material-icons-outlined text-gray-600 dark:text-gray-300 group-hover:text-primary transition-colors">close</span>
</button>
</header>
<!-- Main Content Area -->
<main class="relative z-10 flex-1 flex flex-col px-6 pt-2 pb-8 overflow-y-auto no-scrollbar">
<!-- 2. Scenario Badge & Title -->
<div class="mb-6 text-center">
<div class="inline-flex items-center space-x-2 px-3 py-1 rounded-full bg-orange-500/10 border border-orange-500/20 mb-3">
<span class="w-1.5 h-1.5 rounded-full bg-orange-500 animate-pulse"></span>
<span class="text-xs font-medium text-orange-500 tracking-wide uppercase">Real Developer Scenario</span>
</div>
<h1 class="text-2xl font-bold text-gray-900 dark:text-white leading-tight">
                    Disaster on Main Branch
                </h1>
</div>
<!-- 3. Scenario Container (Terminal Style) -->
<div class="w-full bg-gray-900 border border-gray-800 rounded-xl p-5 mb-8 shadow-lg relative overflow-hidden group">
<!-- Terminal decorative header -->
<div class="flex items-center space-x-1.5 mb-4 opacity-50">
<div class="w-3 h-3 rounded-full bg-red-500"></div>
<div class="w-3 h-3 rounded-full bg-yellow-500"></div>
<div class="w-3 h-3 rounded-full bg-green-500"></div>
</div>
<div class="font-mono text-sm leading-relaxed text-gray-300 relative z-10">
<div class="flex items-start space-x-3 mb-3">
<span class="text-primary mt-0.5">➜</span>
<p>You accidentally committed unfinished code directly to the <span class="text-yellow-400 font-semibold">main</span> branch.</p>
</div>
<div class="flex items-start space-x-3">
<span class="text-gray-500 mt-0.5">#</span>
<p class="text-gray-400 italic">Your teammates haven't pulled the latest changes yet.</p>
</div>
</div>
<!-- Abstract code pattern background -->
<div class="absolute right-0 bottom-0 opacity-5 pointer-events-none transform translate-y-1/4 translate-x-1/4">
<svg fill="none" height="120" viewbox="0 0 100 100" width="120">
<path d="M10 10 L30 30 M10 30 L30 10" stroke="white" stroke-width="2"></path>
<rect height="40" stroke="white" stroke-width="2" width="40" x="50" y="50"></rect>
</svg>
</div>
</div>
<!-- 4. Prompt Header -->
<div class="mb-5">
<h2 class="text-lg font-semibold text-gray-800 dark:text-white mb-1">Choose your strategy</h2>
<p class="text-sm text-gray-500 dark:text-gray-400">Select the safest and most appropriate Git command.</p>
</div>
<!-- 5. Decision Cards (Vertical Stack) -->
<div class="space-y-4 flex-1">
<!-- Option 1: Revert -->
<label class="relative block cursor-pointer group">
<input class="peer sr-only" name="scenario_choice" type="radio"/>
<div class="relative flex items-start p-4 rounded-xl border border-gray-200 dark:border-gray-800 bg-white dark:bg-white/5 hover:bg-gray-50 dark:hover:bg-white/10 transition-all duration-200 peer-checked:border-primary peer-checked:ring-1 peer-checked:ring-primary peer-checked:bg-primary/5">
<div class="flex-shrink-0 mr-4 mt-1">
<div class="w-10 h-10 rounded-lg bg-blue-100 dark:bg-blue-900/30 flex items-center justify-center text-blue-600 dark:text-blue-400">
<span class="material-icons-outlined text-xl">undo</span>
</div>
</div>
<div class="flex-1">
<h3 class="font-mono text-base font-semibold text-gray-900 dark:text-gray-100 mb-1">git revert HEAD</h3>
<p class="text-sm text-gray-500 dark:text-gray-400 leading-snug">Create a new commit that mirrors and undoes the changes. Preserves history.</p>
</div>
<div class="ml-3 hidden peer-checked:block text-primary">
<span class="material-icons-outlined">check_circle</span>
</div>
</div>
</label>
<!-- Option 2: Reset Hard -->
<label class="relative block cursor-pointer group">
<input class="peer sr-only" name="scenario_choice" type="radio"/>
<div class="relative flex items-start p-4 rounded-xl border border-gray-200 dark:border-gray-800 bg-white dark:bg-white/5 hover:bg-gray-50 dark:hover:bg-white/10 transition-all duration-200 peer-checked:border-primary peer-checked:ring-1 peer-checked:ring-primary peer-checked:bg-primary/5">
<div class="flex-shrink-0 mr-4 mt-1">
<div class="w-10 h-10 rounded-lg bg-orange-100 dark:bg-orange-900/30 flex items-center justify-center text-orange-600 dark:text-orange-400">
<span class="material-icons-outlined text-xl">restart_alt</span>
</div>
</div>
<div class="flex-1">
<h3 class="font-mono text-base font-semibold text-gray-900 dark:text-gray-100 mb-1">git reset --hard</h3>
<p class="text-sm text-gray-500 dark:text-gray-400 leading-snug">Delete the commit locally. Destructive if you haven't pushed yet.</p>
</div>
<div class="ml-3 hidden peer-checked:block text-primary">
<span class="material-icons-outlined">check_circle</span>
</div>
</div>
</label>
<!-- Option 3: Force Push -->
<label class="relative block cursor-pointer group">
<input class="peer sr-only" name="scenario_choice" type="radio"/>
<div class="relative flex items-start p-4 rounded-xl border border-gray-200 dark:border-gray-800 bg-white dark:bg-white/5 hover:bg-gray-50 dark:hover:bg-white/10 transition-all duration-200 peer-checked:border-primary peer-checked:ring-1 peer-checked:ring-primary peer-checked:bg-primary/5">
<div class="flex-shrink-0 mr-4 mt-1">
<div class="w-10 h-10 rounded-lg bg-red-100 dark:bg-red-900/30 flex items-center justify-center text-red-600 dark:text-red-400">
<span class="material-icons-outlined text-xl">warning_amber</span>
</div>
</div>
<div class="flex-1">
<h3 class="font-mono text-base font-semibold text-gray-900 dark:text-gray-100 mb-1">git push --force</h3>
<p class="text-sm text-gray-500 dark:text-gray-400 leading-snug">Overwrite history on remote. Very dangerous for shared branches.</p>
</div>
<div class="ml-3 hidden peer-checked:block text-primary">
<span class="material-icons-outlined">check_circle</span>
</div>
</div>
</label>
</div>
</main>
<!-- Bottom Action Bar (Sticky) -->
<div class="p-6 pb-8 bg-background-light dark:bg-background-dark/95 backdrop-blur-sm border-t border-gray-200 dark:border-gray-800 z-20">
<button class="w-full py-4 px-6 bg-primary hover:bg-primary/90 text-white font-semibold rounded-xl shadow-lg shadow-primary/25 transition-all active:scale-[0.98] flex items-center justify-center space-x-2">
<span>Confirm Decision</span>
<span class="material-icons-outlined text-sm">arrow_forward</span>
</button>
</div>
</div>
</body></html>
