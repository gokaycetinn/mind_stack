<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>MindStack Authentication</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#20d3ee",
                        "background-light": "#f6f8f8",
                        "background-dark": "#0F172A", 
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                    boxShadow: {
                        'glow': '0 0 20px -5px rgba(32, 211, 238, 0.3)',
                    }
                },
            },
        }
    </script>
<style>
        /* Custom scrollbar hiding for cleaner mobile view */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-display bg-background-light dark:bg-background-dark text-slate-900 dark:text-white antialiased h-screen w-full flex flex-col items-center justify-center overflow-hidden relative">
<!-- Abstract Background Pattern -->
<div aria-hidden="true" class="absolute inset-0 pointer-events-none overflow-hidden">
<div class="absolute top-[-10%] left-[-10%] w-[50%] h-[40%] bg-primary/10 rounded-full blur-[100px]"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-primary/5 rounded-full blur-[80px]"></div>
<div class="absolute top-[20%] right-[10%] w-[20%] h-[20%] bg-indigo-500/10 rounded-full blur-[60px]"></div>
</div>
<!-- Main Container -->
<main class="relative z-10 w-full max-w-md px-6 flex flex-col h-full justify-between py-12">
<!-- Branding Section -->
<div class="flex-1 flex flex-col items-center justify-center mt-8">
<div class="mb-8 relative group">
<div class="absolute -inset-1 bg-gradient-to-r from-primary to-cyan-600 rounded-xl blur opacity-25 group-hover:opacity-50 transition duration-1000 group-hover:duration-200"></div>
<div class="relative w-20 h-20 bg-slate-800 rounded-xl flex items-center justify-center border border-slate-700 shadow-xl">
<!-- Logo Icon -->
<svg class="w-10 h-10 text-primary" fill="none" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
<path d="M2 17L12 22L22 17" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
<path d="M2 12L12 17L22 12" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</div>
</div>
<h1 class="text-3xl font-bold tracking-tight text-center mb-2">MindStack</h1>
<p class="text-slate-400 text-center text-lg font-medium">Master the stack.</p>
</div>
<!-- Authentication Buttons Section -->
<div class="w-full space-y-4 mb-8">
<!-- Apple Button -->
<button class="w-full group relative flex items-center justify-center gap-3 bg-white text-black py-4 px-6 rounded-xl hover:bg-slate-100 transition-all duration-200 shadow-lg shadow-black/20">
<svg class="w-5 h-5" fill="currentColor" viewbox="0 0 24 24">
<path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.78.81 0 2.14-1.04 3.57-.68 1.48.37 2.76 1.43 3.65 2.7-3.23 1.76-2.48 6.13.62 7.74-.63 1.55-1.57 3.01-2.92 4.43zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"></path>
</svg>
<span class="font-semibold text-base">Continue with Apple</span>
</button>
<!-- Google Button -->
<button class="w-full group relative flex items-center justify-center gap-3 bg-slate-800 border border-slate-700 text-white py-4 px-6 rounded-xl hover:bg-slate-700 hover:border-slate-600 transition-all duration-200 shadow-lg shadow-black/20">
<svg class="w-5 h-5" viewbox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
<span class="font-semibold text-base">Continue with Google</span>
</button>
<!-- Email Button -->
<button class="w-full group relative flex items-center justify-center gap-3 bg-transparent border border-slate-700 text-slate-300 py-4 px-6 rounded-xl hover:bg-slate-800 hover:text-primary hover:border-primary/50 transition-all duration-200">
<svg class="w-5 h-5 text-slate-400 group-hover:text-primary transition-colors" fill="none" stroke="currentColor" viewbox="0 0 24 24">
<path d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
<span class="font-medium text-base">Continue with Email</span>
</button>
</div>
<!-- Footer / Promise -->
<div class="text-center pb-4">
<p class="text-slate-500 text-sm font-medium tracking-wide mb-6">
                No spam. No noise. Just learning.
            </p>
<div class="flex items-center justify-center space-x-6">
<a class="text-xs text-slate-600 hover:text-primary transition-colors" href="#">Terms of Service</a>
<span class="w-1 h-1 rounded-full bg-slate-700"></span>
<a class="text-xs text-slate-600 hover:text-primary transition-colors" href="#">Privacy Policy</a>
</div>
</div>
</main>
</body></html>
