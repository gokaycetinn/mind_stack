<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>MindStack Splash Screen</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#20d3ee",
                        "background-light": "#f6f8f8",
                        "background-dark": "#0F172A", // Updated to match user request: very dark blue
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                    animation: {
                        'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    }
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display antialiased h-screen w-full overflow-hidden flex flex-col items-center justify-center relative selection:bg-primary selection:text-background-dark">
<!-- Background Elements for depth -->
<div class="absolute inset-0 pointer-events-none overflow-hidden">
<!-- Main glow behind center -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[500px] h-[500px] bg-primary/5 rounded-full blur-[100px] opacity-40"></div>
<!-- Subtle gradient overlay -->
<div class="absolute inset-0 bg-gradient-to-b from-transparent via-transparent to-background-dark/80"></div>
<!-- Decorative grid lines (very subtle) -->
<div class="absolute inset-0 opacity-[0.03]" style="background-image: linear-gradient(#20d3ee 1px, transparent 1px), linear-gradient(90deg, #20d3ee 1px, transparent 1px); background-size: 40px 40px;">
</div>
</div>
<!-- Main Content Container -->
<main class="relative z-10 flex flex-col items-center justify-center space-y-8 p-6 animate-fade-in-up">
<!-- Logo Container -->
<div class="relative group">
<!-- Glow effect behind the logo -->
<div class="absolute inset-0 bg-primary/30 blur-2xl rounded-full scale-110 group-hover:scale-125 transition-transform duration-700 opacity-60"></div>
<!-- Logo Icon -->
<div class="relative w-32 h-32 bg-background-dark border border-primary/20 rounded-3xl flex items-center justify-center shadow-2xl shadow-primary/10 ring-1 ring-white/5 backdrop-blur-sm">
<svg class="w-16 h-16 text-primary drop-shadow-[0_0_15px_rgba(34,211,238,0.5)]" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" viewbox="0 0 24 24">
<!-- Left Bracket -->
<path d="M4 7l-2 5 2 5" stroke-width="2"></path>
<!-- Right Bracket -->
<path d="M20 7l2 5-2 5" stroke-width="2"></path>
<!-- Brain/Circuitry abstract shape in middle -->
<path class="opacity-80" d="M9 12a3 3 0 1 0 6 0"></path>
<path class="opacity-80" d="M12 9v6"></path>
<path class="opacity-80" d="M9.5 9.5L14.5 14.5"></path>
<path class="opacity-80" d="M14.5 9.5L9.5 14.5"></path>
<!-- Connecting nodes -->
<circle class="animate-pulse" cx="12" cy="6" fill="currentColor" r="1.5"></circle>
<circle class="animate-pulse" cx="12" cy="18" fill="currentColor" r="1.5" style="animation-delay: 0.5s;"></circle>
</svg>
</div>
</div>
<!-- Typography -->
<div class="text-center space-y-2 mt-4">
<h1 class="text-4xl md:text-5xl font-extrabold tracking-tight text-white drop-shadow-lg">
<span class="bg-clip-text text-transparent bg-gradient-to-b from-white to-primary/80">
                    MindStack
                </span>
</h1>
<p class="text-primary/60 font-light text-lg md:text-xl tracking-wide uppercase text-[0.9rem] letter-spacing-[0.2em]">
                Think like a developer
            </p>
</div>
</main>
<!-- Footer / Loader indicator (Optional for splash screens, but adds polish) -->
<div class="absolute bottom-12 flex flex-col items-center gap-3 opacity-60">
<div class="w-12 h-1 bg-primary/20 rounded-full overflow-hidden">
<div class="h-full bg-primary w-1/3 animate-[shimmer_1.5s_infinite_linear] rounded-full"></div>
</div>
<span class="text-xs text-slate-500 font-mono">v2.4.0</span>
</div>
<!-- Custom CSS for shimmer animation -->
<style>
        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(300%); }
        }
    </style>
</body></html>
