<!DOCTYPE html>
<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>MindStack - Onboarding Purpose</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#20d3ee",
                        "background-light": "#f6f8f8",
                        "background-dark": "#0F172A", 
                        "secondary-purple": "#a855f7",
                        "surface-dark": "#1E293B",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "2xl": "1rem",
                        "3xl": "1.5rem",
                        "full": "9999px"
                    },
                    boxShadow: {
                        'neon': '0 0 30px rgba(32, 211, 238, 0.5)',
                        'neon-purple': '0 0 30px rgba(168, 85, 247, 0.4)',
                        'layered': '0 -10px 40px -5px rgba(0, 0, 0, 0.5)',
                        'glow-dot': '0 0 8px rgba(32, 211, 238, 0.8)',
                    },
                    backgroundImage: {
                        'gradient-radial': 'radial-gradient(var(--tw-gradient-stops))',
                    }
                },
            },
        }
    </script>
<style>
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        body {
            min-height: max(884px, 100dvh);
        }.node-3d {
            box-shadow: inset 2px 2px 4px rgba(255, 255, 255, 0.1),
                        inset -2px -2px 4px rgba(0, 0, 0, 0.3),
                        0 10px 20px rgba(0,0,0,0.5);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-800 dark:text-white h-screen w-full flex flex-col overflow-hidden antialiased selection:bg-primary selection:text-black">
<div class="h-12 w-full flex-none"></div>
<main class="flex-1 flex flex-col px-6 relative z-10 h-full">
<div class="flex justify-end pt-2 pb-2">
<button class="text-sm font-medium text-slate-500 dark:text-slate-400 hover:text-primary dark:hover:text-primary transition-colors duration-200 uppercase tracking-widest text-xs">
                Skip
            </button>
</div>
<div class="mt-4 mb-2">
<h1 class="text-[3.5rem] leading-[0.95] font-bold tracking-tighter text-white">
                Programming<br/>
<span class="text-slate-500">is not</span><br/>
<span class="text-transparent bg-clip-text bg-gradient-to-r from-primary via-blue-400 to-secondary-purple">syntax.</span>
</h1>
<p class="mt-6 text-lg text-slate-400 font-light max-w-xs leading-relaxed">
                It's how you <span class="text-white font-medium border-b border-primary/30">think</span>, <span class="text-white font-medium border-b border-secondary-purple/30">solve</span>, and <span class="text-white font-medium">decide</span>.
            </p>
</div>
<div class="flex-1 flex items-center justify-center relative w-full perspective-[1000px]">
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-80 h-80 bg-primary/10 rounded-full blur-[100px] mix-blend-screen"></div>
<div class="absolute bottom-0 right-0 w-64 h-64 bg-secondary-purple/10 rounded-full blur-[80px] mix-blend-screen"></div>
<div class="relative w-full max-w-[360px] aspect-square transform-style-3d rotate-y-12 rotate-x-12">
<svg class="absolute inset-0 w-full h-full pointer-events-none z-0" viewBox="0 0 400 400">
<path d="M200,200 L100,100" opacity="0.4" stroke="url(#grad1)" stroke-width="1"></path>
<path d="M200,200 L300,120" opacity="0.4" stroke="url(#grad2)" stroke-width="1"></path>
<path d="M200,200 L120,300" opacity="0.4" stroke="url(#grad1)" stroke-width="1"></path>
<path d="M200,200 L280,280" opacity="0.4" stroke="url(#grad2)" stroke-width="1"></path>
<defs>
<linearGradient id="grad1" x1="0%" x2="100%" y1="0%" y2="100%">
<stop offset="0%" style="stop-color:#20d3ee;stop-opacity:1"></stop>
<stop offset="100%" style="stop-color:#20d3ee;stop-opacity:0"></stop>
</linearGradient>
<linearGradient id="grad2" x1="0%" x2="100%" y1="0%" y2="100%">
<stop offset="0%" style="stop-color:#a855f7;stop-opacity:1"></stop>
<stop offset="100%" style="stop-color:#a855f7;stop-opacity:0"></stop>
</linearGradient>
</defs>
</svg>
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-28 h-28 rounded-2xl bg-slate-800 node-3d border border-slate-600/50 z-20 flex items-center justify-center shadow-neon">
<div class="absolute inset-0 bg-gradient-to-br from-slate-700/50 to-transparent rounded-2xl"></div>
<span class="material-symbols-outlined text-5xl text-white drop-shadow-[0_0_15px_rgba(255,255,255,0.5)]">neurology</span>
</div>
<div class="absolute top-[20%] left-[20%] w-14 h-14 rounded-xl bg-slate-800 node-3d border border-primary/30 z-10 flex items-center justify-center animate-[pulse_4s_ease-in-out_infinite]">
<span class="material-symbols-outlined text-2xl text-primary drop-shadow-[0_0_8px_rgba(32,211,238,0.8)]">data_object</span>
</div>
<div class="absolute top-[25%] right-[15%] w-12 h-12 rounded-full bg-slate-800 node-3d border border-secondary-purple/30 z-10 flex items-center justify-center animate-[bounce_5s_infinite]">
<span class="material-symbols-outlined text-xl text-secondary-purple drop-shadow-[0_0_8px_rgba(168,85,247,0.8)]">function</span>
</div>
<div class="absolute bottom-[20%] left-[25%] w-10 h-10 rounded-lg bg-slate-800 node-3d border border-primary/20 z-10 flex items-center justify-center shadow-neon-purple">
<span class="material-symbols-outlined text-lg text-white/80">hub</span>
</div>
<div class="absolute bottom-[25%] right-[25%] w-16 h-16 rounded-xl bg-slate-900/80 backdrop-blur-md border border-slate-700 z-0 flex items-center justify-center">
<span class="material-symbols-outlined text-2xl text-slate-500">account_tree</span>
</div>
<div class="absolute top-10 right-10 w-2 h-2 bg-primary rounded-full blur-[1px] animate-ping"></div>
<div class="absolute bottom-10 left-10 w-1 h-1 bg-secondary-purple rounded-full blur-[1px]"></div>
</div>
</div>
</main>
<div class="relative z-20 w-full bg-surface-dark/90 backdrop-blur-xl border-t border-slate-800 rounded-t-3xl shadow-layered px-6 pt-6 pb-8">
<div class="flex justify-center items-center space-x-4 mb-6">
<div class="w-2.5 h-2.5 bg-primary rounded-full shadow-glow-dot ring-2 ring-primary/20"></div>
<div class="w-1.5 h-1.5 bg-slate-700 rounded-full"></div>
<div class="w-1.5 h-1.5 bg-slate-700 rounded-full"></div>
<div class="w-1.5 h-1.5 bg-slate-700 rounded-full"></div>
</div>
<button class="w-full py-4 bg-white text-black font-bold text-lg rounded-2xl shadow-[0_0_25px_rgba(255,255,255,0.15)] hover:shadow-[0_0_35px_rgba(255,255,255,0.25)] hover:scale-[1.02] active:scale-[0.98] transition-all duration-300 flex items-center justify-center group relative overflow-hidden">
<span class="absolute inset-0 bg-gradient-to-r from-primary/20 via-white/0 to-primary/20 opacity-0 group-hover:opacity-100 transition-opacity duration-500"></span>
<span class="relative z-10 flex items-center">
                Continue
                <span class="material-symbols-outlined ml-2 text-xl transition-transform duration-300 group-hover:translate-x-1">arrow_forward</span>
</span>
</button>
<div class="h-6 w-full flex-none"></div>
</div>

</body></html>
