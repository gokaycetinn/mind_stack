<!DOCTYPE html>

<html class="dark" lang="en"><head>

<script>
        tailwind.config = {

            theme: {
                extend: {
                    colors: {
                        "primary": "#20d3ee",

                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",

                        "2xl": "1rem",
                        "full": "9999px"
                    },
                    boxShadow: {
                        'neon': '0 0 20px rgba(32, 211, 238, 0.4)',

                    }
                },
            },
        }
    </script>
<style>

        .no-scrollbar::-webkit-scrollbar {
            display: none;

            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-background-light dark:bg-background-dark font-display text-slate-800 dark:text-white h-screen w-full flex flex-col overflow-hidden antialiased selection:bg-primary selection:text-black">
<!-- Status Bar Safe Area Placeholder (Simulated for iOS) -->
<div class="h-12 w-full flex-none"></div>

<main class="flex-1 flex flex-col px-6 relative z-10">

<div class="flex justify-end pt-2 pb-6">
<button class="text-sm font-medium text-slate-400 dark:text-slate-400 hover:text-primary dark:hover:text-primary transition-colors duration-200">
                Skip
            </button>
</div>
<!-- Hero Illustration Area -->
<div class="flex-1 flex items-center justify-center relative w-full my-4">

<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-64 h-64 bg-primary/20 rounded-full blur-[80px]"></div>
<div class="absolute top-1/3 left-1/3 w-40 h-40 bg-secondary-purple/20 rounded-full blur-[60px]"></div>
<!-- Illustration Container -->
<div class="relative w-full max-w-[340px] aspect-square">
<!-- Abstract Brain/Code Representation -->
<div class="relative w-full h-full" data-alt="Stylized digital brain connected to flowcharts and code blocks with cyan and purple neon accents">
<!-- Central 'Brain' Node -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-32 h-32 bg-gradient-to-br from-slate-800 to-slate-900 border border-slate-700 rounded-2xl shadow-neon z-20 flex items-center justify-center overflow-hidden">
<div class="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/carbon-fibre.png')] opacity-30"></div>
<span class="material-icons text-6xl text-primary drop-shadow-[0_0_8px_rgba(32,211,238,0.8)]">psychology</span>
</div>
<!-- Orbital Nodes (Flowchart/Code Metaphors) -->
<!-- Node 1: Code Block -->
<div class="absolute top-[15%] left-[10%] w-16 h-16 bg-slate-800/80 backdrop-blur-sm border border-slate-700 rounded-lg flex items-center justify-center shadow-lg z-10 rotate-[-12deg]">
<span class="material-icons text-2xl text-secondary-purple">code</span>
</div>
<!-- Connector Line 1 -->
<svg class="absolute top-[28%] left-[22%] w-24 h-24 pointer-events-none z-0 opacity-60" viewbox="0 0 100 100">
<path d="M10,10 Q50,50 80,80" fill="none" stroke="#a855f7" stroke-dasharray="4 4" stroke-width="2"></path>
</svg>
<!-- Node 2: Logic Flow -->
<div class="absolute bottom-[20%] right-[10%] w-14 h-14 bg-slate-800/80 backdrop-blur-sm border border-slate-700 rounded-full flex items-center justify-center shadow-lg z-10">
<span class="material-icons text-xl text-primary">schema</span>
</div>
<!-- Connector Line 2 -->
<svg class="absolute bottom-[30%] right-[22%] w-20 h-20 pointer-events-none z-0 opacity-60 rotate-180" viewbox="0 0 100 100">
<path d="M10,10 Q50,50 80,80" fill="none" stroke="#20d3ee" stroke-dasharray="4 4" stroke-width="2"></path>
</svg>
<!-- Node 3: Decision -->
<div class="absolute top-[20%] right-[5%] w-12 h-12 bg-slate-800/80 backdrop-blur-sm border border-primary/30 rounded-lg flex items-center justify-center shadow-neon z-10 rotate-[15deg]">
<span class="material-icons text-lg text-white">call_split</span>
</div>
<!-- Node 4: Abstract Data -->
<div class="absolute bottom-[10%] left-[20%] w-10 h-10 bg-slate-800/80 backdrop-blur-sm border border-secondary-purple/30 rounded flex items-center justify-center shadow-neon-purple z-10 rotate-[-6deg]">
<span class="font-mono text-xs text-secondary-purple font-bold">{}</span>
</div>
</div>
</div>
</div>

<div class="space-y-3 max-w-xs mx-auto">

                    Programming is not <span class="text-transparent bg-clip-text bg-gradient-to-r from-primary to-secondary-purple">syntax.</span>
</h1>
<p class="text-lg text-slate-400 font-light leading-relaxed">
                    It's how you <span class="text-slate-200 font-medium">think</span>, <span class="text-slate-200 font-medium">solve</span>, and <span class="text-slate-200 font-medium">decide</span>.
                </p>
</div>

<div class="flex items-center space-x-3 pt-4 pb-2">
<div class="w-8 h-2 bg-primary rounded-full shadow-[0_0_10px_rgba(32,211,238,0.5)]"></div>
<div class="w-2 h-2 bg-slate-700 rounded-full"></div>
<div class="w-2 h-2 bg-slate-700 rounded-full"></div>
<div class="w-2 h-2 bg-slate-700 rounded-full"></div>
</div>

<button class="w-full py-4 px-6 bg-primary hover:bg-primary/90 active:scale-[0.98] text-background-dark font-bold text-lg rounded-xl shadow-[0_0_20px_rgba(32,211,238,0.3)] transition-all duration-200 flex items-center justify-center group">
                Continue
                <span class="material-icons ml-2 group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</div>
</main>
<!-- Home Indicator Safe Area (Simulated) -->
<div class="h-8 w-full flex-none"></div>
