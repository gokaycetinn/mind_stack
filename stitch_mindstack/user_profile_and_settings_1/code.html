<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>MindStack - User Profile</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#20d3ee",
                        "background-light": "#f6f8f8",
                        "background-dark": "#101f22",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        /* Custom scrollbar for webkit */
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: #101f22; 
        }
        ::-webkit-scrollbar-thumb {
            background: #20d3ee; 
            border-radius: 4px;
        }
        
        /* Glassmorphism utility */
        .glass-panel {
            background: rgba(32, 211, 238, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(32, 211, 238, 0.1);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-800 dark:text-slate-200 min-h-screen flex justify-center">
<!-- Mobile Container -->
<main class="w-full max-w-md bg-background-light dark:bg-background-dark min-h-screen relative overflow-hidden flex flex-col">
<!-- Header / Nav -->
<header class="flex justify-between items-center p-6 z-10">
<button class="p-2 rounded-full hover:bg-slate-200 dark:hover:bg-slate-800 transition-colors">
<span class="material-icons-outlined text-slate-600 dark:text-slate-400">arrow_back</span>
</button>
<h1 class="text-lg font-semibold tracking-wide">Profile</h1>
<button class="p-2 rounded-full hover:bg-slate-200 dark:hover:bg-slate-800 transition-colors">
<span class="material-icons-outlined text-slate-600 dark:text-slate-400">more_horiz</span>
</button>
</header>
<!-- Decorative Glow -->
<div class="absolute top-0 left-1/2 -translate-x-1/2 w-64 h-64 bg-primary/20 rounded-full blur-[80px] -z-0 pointer-events-none"></div>
<!-- Profile Section -->
<section class="flex flex-col items-center px-6 pt-2 pb-8 z-10">
<div class="relative group">
<div class="w-28 h-28 rounded-full p-1 bg-gradient-to-tr from-primary to-transparent">
<div class="w-full h-full rounded-full overflow-hidden bg-slate-800 border-4 border-background-light dark:border-background-dark relative">
<img alt="Abstract generated avatar pattern" class="w-full h-full object-cover" data-alt="Abstract generated avatar pattern" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDVjzKvJxKBE1yKcnH6DM2Qz1hANJqvUuRPsblhfIDAL9u0a3xtQ79u79Y23VF-pWWaD8Ju4sug540s5gz0cBP24xLDYvwgdUr_avnezVmcVKnpWFgbtFgDtVT63EjS-kg8jWQZezBNrVvIoyaxjgZ6gCi37sokgx53CIi6Zqf8dnOmu4Hc_eym0biOcF3pm8noWsI1ABwRbMfBNQyixN0JTK_XiJnRs7DjSL4QKkTpVMGr6o2QWu2_XKZabRUF_8u5pR-Ht_lCSpEX"/>
</div>
</div>
<button class="absolute bottom-1 right-1 bg-primary text-background-dark p-1.5 rounded-full shadow-lg hover:scale-105 transition-transform">
<span class="material-icons-outlined text-sm font-bold">edit</span>
</button>
</div>
<h2 class="mt-4 text-2xl font-bold text-slate-900 dark:text-white">AlexDev_99</h2>
<div class="mt-2 px-3 py-1 rounded-full bg-primary/10 border border-primary/20 flex items-center gap-2">
<span class="material-icons-outlined text-primary text-sm">school</span>
<span class="text-xs font-semibold text-primary tracking-wide uppercase">Junior Thinker</span>
</div>
<!-- Level Progress -->
<div class="w-full max-w-[200px] mt-4">
<div class="flex justify-between text-[10px] text-slate-500 mb-1 font-medium uppercase tracking-wider">
<span>Lvl 12</span>
<span>1,250 / 2,000 XP</span>
</div>
<div class="h-1.5 w-full bg-slate-200 dark:bg-slate-800 rounded-full overflow-hidden">
<div class="h-full bg-primary w-[62%] rounded-full shadow-[0_0_10px_rgba(32,211,238,0.5)]"></div>
</div>
</div>
</section>
<!-- Stats Grid -->
<section class="px-6 mb-8 z-10">
<div class="grid grid-cols-3 gap-3">
<!-- Stat Card 1 -->
<div class="glass-panel p-3 rounded-xl flex flex-col items-center text-center gap-2 hover:bg-primary/5 transition-colors">
<div class="w-8 h-8 rounded-lg bg-primary/10 flex items-center justify-center text-primary mb-1">
<span class="material-icons-outlined text-lg">bolt</span>
</div>
<div>
<div class="text-lg font-bold text-slate-900 dark:text-white leading-tight">12.4k</div>
<div class="text-[10px] uppercase tracking-wider text-slate-500 font-medium">Total XP</div>
</div>
</div>
<!-- Stat Card 2 -->
<div class="glass-panel p-3 rounded-xl flex flex-col items-center text-center gap-2 hover:bg-primary/5 transition-colors">
<div class="w-8 h-8 rounded-lg bg-orange-500/10 flex items-center justify-center text-orange-500 mb-1">
<span class="material-icons-outlined text-lg">local_fire_department</span>
</div>
<div>
<div class="text-lg font-bold text-slate-900 dark:text-white leading-tight">14</div>
<div class="text-[10px] uppercase tracking-wider text-slate-500 font-medium">Day Streak</div>
</div>
</div>
<!-- Stat Card 3 -->
<div class="glass-panel p-3 rounded-xl flex flex-col items-center text-center gap-2 hover:bg-primary/5 transition-colors">
<div class="w-8 h-8 rounded-lg bg-emerald-500/10 flex items-center justify-center text-emerald-500 mb-1">
<span class="material-icons-outlined text-lg">check_circle</span>
</div>
<div>
<div class="text-lg font-bold text-slate-900 dark:text-white leading-tight">84</div>
<div class="text-[10px] uppercase tracking-wider text-slate-500 font-medium">Completed</div>
</div>
</div>
</div>
</section>
<!-- Settings List -->
<section class="flex-1 px-6 pb-8 overflow-y-auto z-10">
<h3 class="text-xs font-bold text-slate-500 uppercase tracking-widest mb-4 ml-1">Settings &amp; Preferences</h3>
<div class="bg-white dark:bg-slate-900/40 border border-slate-200 dark:border-slate-800 rounded-xl overflow-hidden backdrop-blur-sm">
<!-- Toggle Item -->
<div class="flex items-center justify-between p-4 border-b border-slate-100 dark:border-slate-800/50 hover:bg-slate-50 dark:hover:bg-slate-800/30 transition-colors">
<div class="flex items-center gap-3">
<div class="p-2 rounded-lg bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-400">
<span class="material-icons-outlined text-xl">notifications</span>
</div>
<span class="font-medium text-sm">Push Notifications</span>
</div>
<label class="relative inline-flex items-center cursor-pointer">
<input checked="" class="sr-only peer" type="checkbox" value=""/>
<div class="w-11 h-6 bg-slate-200 peer-focus:outline-none rounded-full peer dark:bg-slate-700 peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all dark:border-gray-600 peer-checked:bg-primary"></div>
</label>
</div>
<!-- Toggle Item -->
<div class="flex items-center justify-between p-4 border-b border-slate-100 dark:border-slate-800/50 hover:bg-slate-50 dark:hover:bg-slate-800/30 transition-colors">
<div class="flex items-center gap-3">
<div class="p-2 rounded-lg bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-400">
<span class="material-icons-outlined text-xl">speed</span>
</div>
<span class="font-medium text-sm">Performance Mode</span>
</div>
<label class="relative inline-flex items-center cursor-pointer">
<input class="sr-only peer" type="checkbox" value=""/>
<div class="w-11 h-6 bg-slate-200 peer-focus:outline-none rounded-full peer dark:bg-slate-700 peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all dark:border-gray-600 peer-checked:bg-primary"></div>
</label>
</div>
<!-- Link Item -->
<button class="w-full flex items-center justify-between p-4 border-b border-slate-100 dark:border-slate-800/50 hover:bg-slate-50 dark:hover:bg-slate-800/30 transition-colors group">
<div class="flex items-center gap-3">
<div class="p-2 rounded-lg bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-400 group-hover:text-primary transition-colors">
<span class="material-icons-outlined text-xl">person</span>
</div>
<span class="font-medium text-sm">Account Details</span>
</div>
<span class="material-icons-outlined text-slate-400 text-lg">chevron_right</span>
</button>
<!-- Link Item -->
<button class="w-full flex items-center justify-between p-4 hover:bg-slate-50 dark:hover:bg-slate-800/30 transition-colors group">
<div class="flex items-center gap-3">
<div class="p-2 rounded-lg bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-400 group-hover:text-primary transition-colors">
<span class="material-icons-outlined text-xl">lock</span>
</div>
<span class="font-medium text-sm">Privacy &amp; Security</span>
</div>
<span class="material-icons-outlined text-slate-400 text-lg">chevron_right</span>
</button>
</div>
<!-- Danger Zone -->
<div class="mt-6 flex flex-col gap-4">
<button class="w-full p-4 rounded-xl border border-red-500/20 text-red-500 hover:bg-red-500/10 transition-colors text-sm font-medium flex items-center justify-center gap-2">
<span class="material-icons-outlined text-lg">logout</span>
                    Sign Out
                </button>
<div class="text-center">
<p class="text-[10px] text-slate-600 dark:text-slate-500">MindStack v2.4.0 (Build 892)</p>
</div>
</div>
</section>
<!-- Bottom Tab Bar (Contextual) -->
<nav class="bg-white dark:bg-[#15262a] border-t border-slate-200 dark:border-slate-800/60 px-6 py-3 flex justify-between items-center z-20">
<button class="flex flex-col items-center gap-1 text-slate-400 hover:text-primary transition-colors">
<span class="material-icons-outlined">home</span>
</button>
<button class="flex flex-col items-center gap-1 text-slate-400 hover:text-primary transition-colors">
<span class="material-icons-outlined">code</span>
</button>
<button class="relative -top-6 bg-primary text-background-dark p-4 rounded-full shadow-[0_4px_14px_rgba(32,211,238,0.4)] hover:scale-105 transition-transform flex items-center justify-center">
<span class="material-icons-outlined">add</span>
</button>
<button class="flex flex-col items-center gap-1 text-slate-400 hover:text-primary transition-colors">
<span class="material-icons-outlined">leaderboard</span>
</button>
<button class="flex flex-col items-center gap-1 text-primary">
<span class="material-icons-outlined">person</span>
</button>
</nav>
</main>
</body></html>
