<style>::-webkit-scrollbar {

        }.glass-panel {

        }
        .toggle-checkbox:checked + .toggle-label:before {
            transform: translateX(100%);

            box-shadow: 0 0 10px #20d3ee;}
        .toggle-label {
            width: 50px;
            height: 28px;
            background-color: #2b353b;

            position: relative;
            cursor: pointer;
            transition: background-color 0.3s ease-in-out;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.4);
        }
        .toggle-label:before {
            content: '';
            position: absolute;
            top: 3px;
            left: 3px;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background-color: #8899a6;
            transition: transform 0.3s cubic-bezier(0.4, 0.0, 0.2, 1), background-color 0.3s, box-shadow 0.3s;
